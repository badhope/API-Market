<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API-Market | 全网规模化公开API集合</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --accent: #06b6d4;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --bg-hover: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: #334155;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            padding: 2.5rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            opacity: 0.1;
        }
        .header-content { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; }
        h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 0.5rem; }
        .tagline { font-size: 1.1rem; opacity: 0.9; }
        .stats-bar { display: flex; justify-content: center; gap: 2.5rem; flex-wrap: wrap; margin-top: 1.5rem; }
        .stat-item { text-align: center; }
        .stat-value { font-size: 2rem; font-weight: 700; display: block; }
        .stat-label { font-size: 0.8rem; opacity: 0.8; text-transform: uppercase; letter-spacing: 0.05em; }

        /* Search & Filter Bar */
        .search-section {
            padding: 1.5rem 2rem;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .search-row {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }
        .search-box {
            flex: 1;
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.75rem;
            font-size: 1rem;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: var(--bg-dark);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }
        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }
        .search-box .icon {
            position: absolute;
            left: 0.85rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 1rem;
        }
        .filter-row {
            max-width: 900px;
            margin: 0.75rem auto 0;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-row label { font-size: 0.85rem; color: var(--text-secondary); margin-right: 0.25rem; }
        select, .filter-btn {
            padding: 0.4rem 0.75rem;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        select:hover, .filter-btn:hover { border-color: var(--primary); }
        select:focus { outline: none; border-color: var(--primary); }
        .filter-btn.active { background: var(--primary); border-color: var(--primary); }
        .result-count {
            max-width: 900px;
            margin: 0.5rem auto 0;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* Main */
        main { max-width: 1400px; margin: 0 auto; padding: 1.5rem 2rem; }

        /* Categories Grid */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.25rem;
        }
        .category-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.25rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .category-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .category-card:hover { transform: translateY(-3px); border-color: var(--primary); box-shadow: 0 12px 30px rgba(0,0,0,0.3); }
        .category-card:hover::before { opacity: 1; }
        .category-header { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.5rem; }
        .category-icon { font-size: 1.4rem; }
        .category-name { font-size: 1rem; font-weight: 600; flex: 1; }
        .category-count { background: var(--primary); color: white; padding: 0.2rem 0.6rem; border-radius: 10px; font-size: 0.8rem; font-weight: 600; }
        .category-quality { font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.25rem; }
        .category-desc { color: var(--text-secondary); font-size: 0.8rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* API List View */
        .api-list-view { display: none; }
        .api-list-view.active { display: block; }
        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.75rem;
        }
        .list-title { font-size: 1.3rem; font-weight: 600; }
        .list-controls { display: flex; gap: 0.5rem; align-items: center; }
        .back-btn, .sort-btn {
            padding: 0.4rem 0.85rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .back-btn:hover, .sort-btn:hover { background: var(--primary); border-color: var(--primary); }

        /* API Items */
        .api-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.1rem 1.25rem;
            margin-bottom: 0.75rem;
            transition: all 0.2s ease;
        }
        .api-item:hover { border-color: var(--primary); transform: translateX(4px); }
        .api-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; }
        .api-name { font-size: 1.05rem; font-weight: 600; color: var(--accent); text-decoration: none; word-break: break-all; }
        .api-name:hover { text-decoration: underline; }
        .api-badges { display: flex; gap: 0.4rem; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
        .badge { padding: 0.2rem 0.45rem; border-radius: 4px; font-size: 0.7rem; font-weight: 600; white-space: nowrap; }
        .badge-auth { background: rgba(245,158,11,0.2); color: var(--warning); }
        .badge-free { background: rgba(16,185,129,0.2); color: var(--success); }
        .badge-https { background: rgba(99,102,241,0.2); color: var(--primary); }
        .badge-grade-a { background: rgba(16,185,129,0.25); color: #10b981; border: 1px solid rgba(16,185,129,0.5); }
        .badge-grade-b { background: rgba(59,130,246,0.25); color: #3b82f6; border: 1px solid rgba(59,130,246,0.5); }
        .badge-grade-c { background: rgba(245,158,11,0.25); color: #f59e0b; border: 1px solid rgba(245,158,11,0.5); }
        .badge-grade-d, .badge-grade-f { background: rgba(239,68,68,0.25); color: #ef4444; border: 1px solid rgba(239,68,68,0.5); }
        .api-desc { color: var(--text-secondary); font-size: 0.85rem; margin: 0.4rem 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .api-meta { display: flex; gap: 0.75rem; font-size: 0.75rem; color: var(--text-secondary); flex-wrap: wrap; }
        .api-meta span { display: flex; align-items: center; gap: 0.2rem; }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }
        .page-btn {
            padding: 0.5rem 0.85rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .page-btn:hover { background: var(--primary); border-color: var(--primary); }
        .page-btn.active { background: var(--primary); border-color: var(--primary); }
        .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Loading */
        .loading { text-align: center; padding: 3rem; color: var(--text-secondary); }
        .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 1rem; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Footer */
        footer { text-align: center; padding: 2.5rem 2rem; border-top: 1px solid var(--border); color: var(--text-secondary); }
        footer a { color: var(--accent); text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            .stats-bar { gap: 1.25rem; }
            .stat-value { font-size: 1.5rem; }
            .categories-grid { grid-template-columns: 1fr; }
            .search-row { flex-direction: column; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>🌐 API-Market</h1>
            <p class="tagline">全网规模化公开API集合 · 多源聚合 · 智能分类 · 质量评分</p>
            <div class="stats-bar">
                <div class="stat-item"><span class="stat-value" id="stat-apis">-</span><span class="stat-label">公开API</span></div>
                <div class="stat-item"><span class="stat-value" id="stat-cats">-</span><span class="stat-label">分类</span></div>
                <div class="stat-item"><span class="stat-value" id="stat-sources">4</span><span class="stat-label">数据源</span></div>
                <div class="stat-item"><span class="stat-value" id="stat-grade-a">-</span><span class="stat-label">A级</span></div>
            </div>
        </div>
    </header>

    <section class="search-section">
        <div class="search-row">
            <div class="search-box">
                <span class="icon">🔍</span>
                <input type="text" id="search-input" placeholder="搜索API名称、描述、分类...">
            </div>
        </div>
        <div class="filter-row">
            <label>分类:</label>
            <select id="filter-category"><option value="">全部分类</option></select>
            <label>质量:</label>
            <select id="filter-grade">
                <option value="">全部等级</option>
                <option value="A">⭐ A级</option>
                <option value="B">🔷 B级</option>
                <option value="C">🟡 C级</option>
                <option value="D">🔴 D级</option>
            </select>
            <label>排序:</label>
            <select id="filter-sort">
                <option value="quality-desc">质量评分 ↓</option>
                <option value="quality-asc">质量评分 ↑</option>
                <option value="name-asc">名称 A-Z</option>
                <option value="name-desc">名称 Z-A</option>
            </select>
            <button class="filter-btn" id="filter-free" onclick="toggleFree()">🆓 仅免费</button>
            <button class="filter-btn" id="filter-cors" onclick="toggleCors()">🌐 仅CORS</button>
        </div>
        <div class="result-count" id="result-count"></div>
    </section>

    <main>
        <!-- Categories View -->
        <div id="categories-view">
            <div class="categories-grid" id="categories-grid">
                <div class="loading"><div class="spinner"></div><p>正在加载...</p></div>
            </div>
        </div>

        <!-- API List View -->
        <div class="api-list-view" id="api-list-view">
            <div class="list-header">
                <h2 class="list-title" id="list-title">API列表</h2>
                <div class="list-controls">
                    <button class="back-btn" onclick="goBack()">← 返回</button>
                </div>
            </div>
            <div id="api-items"></div>
            <div class="pagination" id="pagination"></div>
        </div>
    </main>

    <footer>
        <p>API-Market · 全网规模化公开API集合</p>
        <p>数据来源: <a href="https://github.com/public-apis/public-apis" target="_blank">public-apis</a> · <a href="https://apis.guru/" target="_blank">APIs.guru</a> · GitHub · Web</p>
    </footer>

    <script>
        const API_BASE = '';
        const PER_PAGE = 30;
        const categoryIcons = {
            'animals':'🐾','anime':'🎌','anti-malware':'🛡️','art-design':'🎨','auth':'🔐',
            'blockchain':'⛓️','books':'📚','business':'💼','calendar':'📅','cloud-storage':'☁️',
            'ci':'🔄','cryptocurrency':'🪙','currency':'💱','data-validation':'✅','development':'💻',
            'dictionaries':'📖','documents':'📄','email':'📧','entertainment':'🎬','environment':'🌱',
            'events':'📅','finance':'💰','food-drink':'🍔','games-comics':'🎮','geocoding':'🗺️',
            'government':'🏛️','health':'🏥','jobs':'💼','machine-learning':'🤖','music':'🎵',
            'news':'📰','open-data':'📊','open-source':'🔧','patent':'📜','personality':'🧠',
            'phone':'📱','photography':'📷','programming':'💻','science-math':'🔬','security':'🔒',
            'shopping':'🛒','social':'👥','sports-fitness':'⚽','test-data':'🧪','text-analysis':'📝',
            'tracking':'📍','transportation':'🚗','url-shorteners':'🔗','vehicle':'🚙','video':'📹',
            'weather':'🌤️','analytics':'📊','payment':'💳','iot':'📡','collaboration':'🤝',
            'media':'📺','telecom':'📞','education':'🎓','other':'📦'
        };

        let state = {
            view: 'categories', // 'categories' | 'list'
            currentCategory: null,
            searchQuery: '',
            filterGrade: '',
            filterFree: false,
            filterCors: false,
            sortBy: 'quality-desc',
            page: 1,
            total: 0,
            totalPages: 0,
        };

        // Init
        async function init() {
            try {
                const res = await fetch(`${API_BASE}/api/stats`);
                const stats = await res.json();
                document.getElementById('stat-apis').textContent = stats.total_apis.toLocaleString();
                document.getElementById('stat-cats').textContent = stats.total_categories;
                document.getElementById('stat-grade-a').textContent = (stats.grade_distribution?.A || 0).toLocaleString();
            } catch(e) { console.warn('Stats fetch failed, using defaults'); }

            try {
                const res = await fetch(`${API_BASE}/api/categories?sort=api_count&order=desc`);
                const data = await res.json();
                const sel = document.getElementById('filter-category');
                data.categories.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c.id;
                    opt.textContent = `${categoryIcons[c.id]||'📦'} ${c.name} (${c.api_count})`;
                    sel.appendChild(opt);
                });
                renderCategories(data.categories);
            } catch(e) {
                // Fallback: load from static JSON
                const res = await fetch('api-database.json');
                const db = await res.json();
                const sel = document.getElementById('filter-category');
                db.categories.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c.id;
                    opt.textContent = `${categoryIcons[c.id]||'📦'} ${c.name} (${c.api_count})`;
                    sel.appendChild(opt);
                });
                renderCategories(db.categories);
            }
        }

        function renderCategories(categories) {
            const grid = document.getElementById('categories-grid');
            grid.innerHTML = categories.map(c => `
                <div class="category-card" onclick="openCategory('${c.id}')">
                    <div class="category-header">
                        <span class="category-icon">${categoryIcons[c.id]||'📦'}</span>
                        <span class="category-name">${c.name || c.display_name}</span>
                        <span class="category-count">${c.api_count}</span>
                    </div>
                    <div class="category-quality">⭐ 平均质量: ${c.avg_quality || '-'}</div>
                    <p class="category-desc">${c.id}</p>
                </div>
            `).join('');
        }

        async function openCategory(catId) {
            state.view = 'list';
            state.currentCategory = catId;
            state.page = 1;
            state.searchQuery = '';
            document.getElementById('search-input').value = '';
            document.getElementById('categories-view').style.display = 'none';
            document.getElementById('api-list-view').classList.add('active');
            await fetchApis();
        }

        function goBack() {
            state.view = 'categories';
            state.currentCategory = null;
            state.searchQuery = '';
            document.getElementById('search-input').value = '';
            document.getElementById('categories-view').style.display = 'block';
            document.getElementById('api-list-view').classList.remove('active');
        }

        async function fetchApis() {
            const items = document.getElementById('api-items');
            items.innerHTML = '<div class="loading"><div class="spinner"></div><p>加载中...</p></div>';

            let url;
            if (state.searchQuery) {
                url = `${API_BASE}/api/search?q=${encodeURIComponent(state.searchQuery)}&page=${state.page}&per_page=${PER_PAGE}`;
            } else if (state.currentCategory) {
                const [sort, order] = state.sortBy.split('-');
                url = `${API_BASE}/api/category/${state.currentCategory}?page=${state.page}&per_page=${PER_PAGE}&sort=${sort}&order=${order}`;
            } else {
                const [sort, order] = state.sortBy.split('-');
                url = `${API_BASE}/api?page=${state.page}&per_page=${PER_PAGE}&sort=${sort}&order=${order}`;
                if (state.filterGrade) url += `&grade=${state.filterGrade}`;
                if (state.filterFree) url += `&free=true`;
                if (state.filterCors) url += `&cors=true`;
            }

            try {
                const res = await fetch(url);
                const data = await res.json();

                if (data.error) { items.innerHTML = `<p style="text-align:center;padding:2rem">${data.error}</p>`; return; }

                const apis = data.apis || data.results || [];
                state.total = data.total;
                state.totalPages = data.total_pages || Math.ceil(data.total / PER_PAGE);

                const catName = data.category?.name || state.currentCategory || '';
                document.getElementById('list-title').textContent =
                    state.searchQuery ? `🔍 搜索: "${state.searchQuery}" (${state.total}个结果)` :
                    `${categoryIcons[state.currentCategory]||''} ${catName} (${state.total})`;

                document.getElementById('result-count').textContent = `共 ${state.total} 个API · 第 ${state.page}/${state.totalPages} 页`;

                if (apis.length === 0) {
                    items.innerHTML = '<div style="text-align:center;padding:3rem;color:var(--text-secondary)">🔍 未找到匹配的API</div>';
                } else {
                    items.innerHTML = apis.map(renderApiItem).join('');
                }

                renderPagination();
            } catch(e) {
                // Fallback: load from static JSON
                await fetchApisFallback();
            }
        }

        async function fetchApisFallback() {
            const items = document.getElementById('api-items');
            try {
                const res = await fetch('api-database.json');
                const db = await res.json();
                let apis = [];
                for (const cat of db.categories) {
                    for (const api of cat.apis) {
                        apis.push({...api, _cat: cat.id, _catName: cat.name});
                    }
                }

                if (state.currentCategory) apis = apis.filter(a => a._cat === state.currentCategory);
                if (state.searchQuery) {
                    const q = state.searchQuery.toLowerCase();
                    apis = apis.filter(a => `${a.name} ${a.description} ${a._catName}`.toLowerCase().includes(q));
                }
                if (state.filterGrade) apis = apis.filter(a => a.quality_grade === state.filterGrade);
                if (state.filterFree) apis = apis.filter(a => !a.auth);
                if (state.filterCors) apis = apis.filter(a => a.cors === true);

                const [sort, order] = state.sortBy.split('-');
                apis.sort((a,b) => {
                    if (sort === 'quality') return order === 'desc' ? (b.quality_score||0) - (a.quality_score||0) : (a.quality_score||0) - (b.quality_score||0);
                    return order === 'desc' ? b.name.localeCompare(a.name) : a.name.localeCompare(b.name);
                });

                state.total = apis.length;
                state.totalPages = Math.ceil(apis.length / PER_PAGE);
                const start = (state.page - 1) * PER_PAGE;
                const pageApis = apis.slice(start, start + PER_PAGE);

                document.getElementById('list-title').textContent = state.searchQuery ?
                    `🔍 "${state.searchQuery}" (${state.total})` :
                    `${categoryIcons[state.currentCategory]||''} ${state.currentCategory} (${state.total})`;
                document.getElementById('result-count').textContent = `共 ${state.total} 个API`;

                items.innerHTML = pageApis.length ? pageApis.map(renderApiItem).join('') :
                    '<div style="text-align:center;padding:3rem;color:var(--text-secondary)">🔍 未找到匹配的API</div>';
                renderPagination();
            } catch(e2) {
                items.innerHTML = '<p style="text-align:center;padding:2rem;color:var(--danger)">加载失败</p>';
            }
        }

        function renderApiItem(api) {
            const authBadge = api.auth ? `<span class="badge badge-auth">${api.auth}</span>` : '<span class="badge badge-free">免费</span>';
            const httpsBadge = api.https ? '<span class="badge badge-https">HTTPS</span>' : '';
            const grade = api.quality_grade;
            const gradeBadge = grade ? `<span class="badge badge-grade-${grade.toLowerCase()}">${grade}</span>` : '';
            let hostname = 'N/A';
            try { hostname = new URL(api.url).hostname; } catch(e) {}
            return `
                <div class="api-item">
                    <div class="api-top">
                        <a href="${api.url}" target="_blank" class="api-name">${api.name}</a>
                        <div class="api-badges">${gradeBadge}${authBadge}${httpsBadge}</div>
                    </div>
                    <p class="api-desc">${api.description || '暂无描述'}</p>
                    <div class="api-meta">
                        <span>🔗 ${hostname}</span>
                        ${api.cors ? '<span>✓ CORS</span>' : ''}
                        ${api.quality_score ? `<span>⭐ ${api.quality_score}分</span>` : ''}
                        ${api.source ? `<span>📡 ${api.source}</span>` : ''}
                    </div>
                </div>`;
        }

        function renderPagination() {
            const el = document.getElementById('pagination');
            if (state.totalPages <= 1) { el.innerHTML = ''; return; }
            let pages = [];
            const maxShow = 7;
            let start = Math.max(1, state.page - 3);
            let end = Math.min(state.totalPages, start + maxShow - 1);
            if (end - start < maxShow - 1) start = Math.max(1, end - maxShow + 1);

            if (state.page > 1) pages.push(`<button class="page-btn" onclick="goPage(${state.page-1})">← 上一页</button>`);
            for (let i = start; i <= end; i++) {
                pages.push(`<button class="page-btn ${i===state.page?'active':''}" onclick="goPage(${i})">${i}</button>`);
            }
            if (state.page < state.totalPages) pages.push(`<button class="page-btn" onclick="goPage(${state.page+1})">下一页 →</button>`);

            el.innerHTML = pages.join('');
        }

        function goPage(p) { state.page = p; fetchApis(); window.scrollTo({top: 0, behavior: 'smooth'}); }

        function toggleFree() {
            state.filterFree = !state.filterFree;
            document.getElementById('filter-free').classList.toggle('active');
            state.page = 1;
            if (state.view === 'list') fetchApis();
        }
        function toggleCors() {
            state.filterCors = !state.filterCors;
            document.getElementById('filter-cors').classList.toggle('active');
            state.page = 1;
            if (state.view === 'list') fetchApis();
        }

        // Event listeners
        let searchTimer;
        document.getElementById('search-input').addEventListener('input', function(e) {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => {
                state.searchQuery = e.target.value.trim();
                if (state.searchQuery && state.view === 'categories') {
                    state.view = 'list';
                    document.getElementById('categories-view').style.display = 'none';
                    document.getElementById('api-list-view').classList.add('active');
                }
                state.page = 1;
                if (state.view === 'list') fetchApis();
            }, 300);
        });

        document.getElementById('filter-grade').addEventListener('change', function(e) {
            state.filterGrade = e.target.value;
            state.page = 1;
            if (state.view === 'list') fetchApis();
        });

        document.getElementById('filter-sort').addEventListener('change', function(e) {
            state.sortBy = e.target.value;
            state.page = 1;
            if (state.view === 'list') fetchApis();
        });

        document.getElementById('filter-category').addEventListener('change', function(e) {
            if (e.target.value) {
                openCategory(e.target.value);
            } else if (state.view === 'list') {
                goBack();
            }
        });

        init();
    </script>
</body>
</html>

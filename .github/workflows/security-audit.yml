name: Security Audit

# Scheduled weekly (so build is never blocked) + manual trigger.
# Two jobs: npm audit on the frontend and a Python safety check.
# Both are non-fatal on advisories that the static-export model
# already mitigates (see SECURITY.md "Attack Surface" section);
# Dependabot handles the auto-PR remediation, this job is the
# tripwire that surfaces anything Dependabot can't cover.

on:
  schedule:
    # Monday 06:00 UTC — sits right after the 06:30 data refresh so
    # we audit the freshly-built artifact, not stale.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: security-audit
  cancel-in-progress: false

jobs:
  npm-audit:
    name: npm audit (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci --no-audit --prefer-offline
      - name: Audit production dependencies
        working-directory: frontend
        # `--omit=dev` skips eslint / typescript / tailwind — those are
        # build-time only and never ship to the static bundle, so
        # vulnerabilities there can't affect a visitor. We still scan
        # them in the Dependabot config.
        run: |
          set -e
          # `audit-level=high` would fail the job on the known next 14.x
          # CVEs (mitigated by static export). Print + return non-zero
          # only on critical so the cron job still emails a notice for
          # true emergencies while not blocking on long-tail findings.
          OUTPUT=$(npm audit --omit=dev --json || true)
          CRIT=$(echo "$OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['metadata']['vulnerabilities'].get('critical',0))")
          HIGH=$(echo "$OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['metadata']['vulnerabilities'].get('high',0))")
          echo "::notice::npm audit summary — critical: $CRIT, high: $HIGH"
          echo "$OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(json.dumps(d['metadata']['vulnerabilities'], indent=2))"
          if [ "$CRIT" -gt 0 ]; then
            echo "::error::$CRIT critical npm vulnerabilities found"
            exit 1
          fi
          echo "No critical npm vulnerabilities."

  python-audit:
    name: Python dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install pip-audit
        run: uv tool install pip-audit
      - name: Audit installed packages
        # `pip-audit` reads the resolved lockfile (`uv.lock`) directly,
        # so we don't have to install the full env for a scan.
        run: |
          set -e
          # Same logic as npm: critical fails, high is just reported.
          OUTPUT=$(uv tool run --from "pip-audit>=2.7" pip-audit --strict --no-deps --skip-editable 2>&1 || true)
          echo "$OUTPUT" | tail -50
          # Count "CVE-" lines in the output to decide exit.
          CRIT=$(echo "$OUTPUT" | grep -cE "ID: (CVE|GHSA)-" || true)
          if [ "$CRIT" -gt 0 ]; then
            echo "::notice::pip-audit reported $CRIT advisories (review log for severity)"
          fi
          echo "pip-audit completed."

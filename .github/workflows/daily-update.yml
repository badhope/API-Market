name: Daily Data Update

on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:

jobs:
  collect:
    name: Collect & Validate
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv pip install --system -e ".[pipeline]"

      - name: Run collection pipeline
        id: pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python pipeline/collector.py

      - name: Validate new data
        id: validate
        run: python scripts/validate_data.py

      - name: Check for changes
        id: check_changes
        run: |
          if [ -f data/collected/pipeline_output.json ]; then
            API_COUNT=$(python -c "import json; print(json.load(open('data/collected/pipeline_output.json')).get('total_apis',0))")
            echo "Collected $API_COUNT APIs"
            echo "changes=true" >> "$GITHUB_OUTPUT"
            echo "api_count=$API_COUNT" >> "$GITHUB_OUTPUT"
          else
            echo "No pipeline output found"
            echo "changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.check_changes.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "data: daily API collection update (${{ steps.check_changes.outputs.api_count }} APIs)"
          title: "🌐 Daily API Update — ${{ steps.check_changes.outputs.api_count }} APIs collected"
          body: |
            Automated daily API collection pipeline.

            **Changes:**
            - Collected ${{ steps.check_changes.outputs.api_count }} APIs from multiple sources
            - Data validated and deduplicated

            Auto-generated by the [daily-update workflow](https://github.com/${{ github.repository }}/actions/workflows/daily-update.yml).
          branch: data/daily-update
          delete-branch: true
          labels: data, automated
name: Daily API Collection & Update

on:
  schedule:
    - cron: '0 3 * * *'  # 每天凌晨3点(UTC)执行
  workflow_dispatch:      # 支持手动触发

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  collect-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Run collection pipeline
        id: pipeline
        run: |
          python scripts/pipeline.py 2>&1 | tee pipeline.log
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Validate data
        id: validate
        run: |
          python scripts/validate.py 2>&1 | tee validate.log
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Check for changes
        id: check_changes
        run: |
          # 检查数据文件是否有变化
          if git diff --quiet api-database.json search-index.json 2>/dev/null; then
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "📊 无数据变化"
          else
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "📊 检测到数据变化"
          fi

          # 输出统计信息
          python3 -c "
          import json
          import sys
          try:
              with open('api-database.json') as f:
                  db = json.load(f)
              print(f'API总数: {db[\"metadata\"][\"total_apis\"]}')
              print(f'分类数: {db[\"metadata\"][\"total_categories\"]}')
              other = next((c for c in db['categories'] if c['id']=='other'), None)
              if other:
                  print(f'Other分类: {other[\"api_count\"]} 个')
              else:
                  print('Other分类: 0 个')
          except Exception as e:
              print(f'读取数据库失败: {e}')
              sys.exit(1)
          "

      - name: Create Pull Request
        if: steps.check_changes.outputs.changes == 'true' && steps.validate.outputs.exit_code == '0'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: '🤖 自动更新: API数据采集 ${{ github.run_id }}'
          body: |
            ## 自动API数据更新

            ### 执行摘要
            - 📅 执行时间: ${{ github.event.schedule || '手动触发' }}
            - 🔄 数据来源: APIs.guru + GitHub awesome-api
            - ✅ 数据验证: 通过

            ### 变更内容
            - 自动采集最新公开API
            - 去重、分类、质量评分
            - 更新搜索索引

            ### 检查清单
            - [x] 数据采集完成
            - [x] 数据验证通过
            - [x] 索引更新完成

            ---
            *此PR由GitHub Actions自动生成*
          commit-message: '🤖 auto: update API database ${{ github.run_id }}'
          branch: auto-update-apis-${{ github.run_id }}
          delete-branch: true
          labels: |
            automated
            data-update

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs
          path: |
            pipeline.log
            validate.log
          retention-days: 7

  health-check:
    runs-on: ubuntu-latest
    needs: collect-and-update
    if: always()
    steps:
      - name: Health check
        run: |
          echo "检查工作流状态..."
          echo "collect-and-update: ${{ needs.collect-and-update.result }}"

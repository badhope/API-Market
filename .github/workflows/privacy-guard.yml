name: Privacy Guard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scan-secrets:
    name: Scan for leaked secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan working tree for GitHub tokens
        run: |
          # Exclude binary / generated / vendored content from the secret scan.
          EXCLUDES=(
            --exclude-dir=.git
            --exclude-dir=node_modules
            --exclude-dir=.venv
            --exclude-dir=dist
            --exclude-dir=build
            --exclude-dir=.next
            --exclude-dir=.mypy_cache
            --exclude-dir=.ruff_cache
            --exclude="*.db"
            --exclude="*.db-shm"
            --exclude="*.db-wal"
            --exclude="*.png"
            --exclude="*.jpg"
            --exclude="*.svg"
            --exclude="*.ico"
            --exclude="*.woff*"
            --exclude="uv.lock"
          )
          for regex in \
            "ghp_[A-Za-z0-9]{36}" \
            "gho_[A-Za-z0-9]{36}|ghu_[A-Za-z0-9]{36}|ghs_[A-Za-z0-9]{36}|ghr_[A-Za-z0-9]{36}" \
            "github_pat_[A-Za-z0-9_]{82}" \
            "xox[baprs]-[0-9A-Za-z-]{10,}" \
            "sk-[A-Za-z0-9]{32,}" \
            "AKIA[0-9A-Z]{16}"; do
            HITS=$(grep -rE "$regex" "${EXCLUDES[@]}" \
              --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" \
              --include="*.py" --include="*.json" --include="*.md" \
              --include="*.yaml" --include="*.yml" --include="*.toml" \
              --include="*.env" --include="*.sh" . 2>/dev/null || true)
            if [ -n "$HITS" ]; then
              echo "::error::Found secret pattern $regex:"
              echo "$HITS"
              exit 1
            fi
          done
          echo "No secrets detected in working tree."

      - name: Scan git history for secrets
        run: |
          set -e
          if git log --all -p | grep -E "ghp_[A-Za-z0-9]{36}"; then
            echo "::error::Found GitHub token in git history"
            exit 1
          fi
          echo "No secrets detected in git history."

      - name: Verify .env files are gitignored
        run: |
          for f in .env .env.local .env.production .env.development backend/.env frontend/.env.local; do
            if git ls-files --error-unmatch "$f" 2>/dev/null; then
              echo "::error::$f is tracked by git but should be ignored"
              exit 1
            fi
          done
          echo "All sensitive .env files are properly gitignored."

      - name: Verify no large data files in git
        run: |
          # data/api_market.db is intentionally tracked (Pages deploy reads it).
          # Everything else (raw JSON snapshots, alternative SQLite layouts)
          # must stay gitignored.
          for pattern in "*.sqlite" "*.sqlite3" "api-database.json" "search-index.json"; do
            HITS=$(git ls-files "$pattern" 2>/dev/null || true)
            if [ -n "$HITS" ]; then
              echo "::error::Large data file matching $pattern is tracked by git:"
              echo "$HITS"
              exit 1
            fi
          done
          echo "No untracked large data files."

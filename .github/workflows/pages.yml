name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build Static Site
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore cached SQLite database
        id: cache
        uses: actions/cache@v4
        with:
          path: data/api_market.db
          key: api-market-db-v1
          restore-keys: |
            api-market-db-

      - name: Rebuild SQLite database (cache miss)
        # The DB is gitignored (it ships in the GitHub Pages bundle, not the
        # repo). On a cold cache we fall back to running the migration
        # script from the legacy JSON snapshot if one is available locally.
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          if [ -f api-database.json ]; then
            python scripts/migrate_to_sqlite.py
          else
            mkdir -p data
            echo "WARNING: no cache hit and no api-database.json; build_static_data.py will use whatever is in data/." >&2
          fi

      - name: Dump static data from SQLite
        # build_static_data.py only uses the stdlib sqlite3 module, so we
        # don't need aiosqlite / FastAPI / etc. here.
        run: |
          mkdir -p frontend/public/data
          python scripts/build_static_data.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Node dependencies
        working-directory: frontend
        run: npm ci

      - name: Build static export
        working-directory: frontend
        env:
          STATIC_EXPORT: "true"
          NEXT_PUBLIC_API_URL: ""
        run: npm run build

      - name: Add .nojekyll (bypass Jekyll processing)
        run: touch frontend/out/.nojekyll

      - name: Create CNAME placeholder (delete if you don't use a custom domain)
        run: |
          if [ -n "$PAGES_CNAME" ]; then
            echo "$PAGES_CNAME" > frontend/out/CNAME
          fi

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/out
          publish_branch: gh-pages
          # Keep the gh-pages branch history short
          force_orphan: true
          # Quiet noisy diffs
          enable_jekyll: false
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"

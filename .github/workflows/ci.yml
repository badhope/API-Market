name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# CodeQL needs `security-events: write` to upload SARIF results;
# `contents: read` is the safe default for everything else.
permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install ruff
        run: uv tool install ruff
      - run: uv tool run ruff check backend/ pipeline/ scripts/
      - run: uv tool run ruff format --check backend/ pipeline/ scripts/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install dev dependencies
        run: uv sync --extra dev
      - run: uv run mypy backend/api_market/ --config-file pyproject.toml

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install dev dependencies
        run: uv sync --extra dev
      - name: Run tests
        run: uv run --directory backend pytest tests/ -v --cov=api_market --cov-report=xml --cov-fail-under=70
      - name: Upload coverage
        uses: codecov/codecov-action@v7
        with:
          file: ./backend/coverage.xml
          flags: unittests
          fail_ci_if_error: false

  security:
    name: Security Scan (CodeQL)
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v6
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          # Scan both the Python backend and the Next.js frontend.
          # `security-extended` adds queries beyond the default
          # `security-and-quality` set — these catch things like
          # clear-text credentials and path-injection sinks that the
          # default pack would miss.
          languages: python, javascript, typescript
          queries: security-extended
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          # The frontend is a TS/JSX project under frontend/src;
          # without this filter CodeQL still walks the whole tree but
          # the results tab will be much cleaner.
          paths: backend/, frontend/src/, pipeline/, scripts/

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, typecheck]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: api-market:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: api-market:5.0.0
    container_name: api-market-api
    expose:
      - "8080"
    environment:
      - APP_ENV=production
      - DEBUG=false
      - DATABASE_URL=sqlite+aiosqlite:///./data/api_market.db
      - RATE_LIMIT_PER_MINUTE=600
    volumes:
      - api_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "512M"
        reservations:
          cpus: "0.5"
          memory: "256M"

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    image: api-market-frontend:5.0.0
    container_name: api-market-frontend
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://api:8080
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "512M"
        reservations:
          cpus: "0.5"
          memory: "256M"

  nginx:
    image: nginx:1.27-alpine
    container_name: api-market-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "128M"

volumes:
  api_data:
    driver: local
